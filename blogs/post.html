<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Post | Connektly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/connektly-favicon.png" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/pages.css" />
    <style>
      .post-header {
        text-align: center;
        max-width: 860px;
        margin: 0 auto 4rem;
        padding-top: 2rem;
      }
      .post-header__date {
        color: var(--green-deep);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 0.9rem;
      }
      .post-header h1 {
        font-family: "Sora", sans-serif;
        font-size: clamp(2.5rem, 5vw, 4rem);
        margin: 1.5rem 0;
        line-height: 1.1;
      }
      .post-header__meta {
        font-size: 1.1rem;
        color: var(--muted);
      }
      .post-content {
        max-width: 800px;
        margin: 0 auto 6rem;
        line-height: 1.8;
        font-size: 1.15rem;
        color: rgba(9, 19, 13, 0.88);
      }
      .post-content h2, .post-content h3 {
        font-family: "Sora", sans-serif;
        margin-top: 3rem;
        margin-bottom: 1rem;
      }
      .post-content p {
        margin-bottom: 1.5rem;
      }
      .post-content ul, .post-content ol {
        margin-bottom: 1.5rem;
        padding-left: 1.5rem;
      }
      .post-content li {
        margin-bottom: 0.5rem;
      }
      .post-content code {
        background: rgba(0,0,0,0.05);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-family: monospace;
      }
    </style>
  </head>
  <body class="subpage" data-page="blogs">
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5JJF6K8P"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
    <div data-site-header></div>

    <main class="page-main">
      <div id="post-container">
        <div style="text-align: center; padding: 6rem; color: var(--muted); font-weight: 600;">Opening article...</div>
      </div>
    </main>

    <div data-site-footer></div>

    <script src="/site-layout.js"></script>
    <script>
      async function loadPost() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const container = document.getElementById("post-container");

        if (!id) {
          container.innerHTML = `<div style="text-align: center; padding: 4rem;"><h2>Post not found</h2><a href="/blogs">Return to Blogs</a></div>`;
          return;
        }

        try {
          const res = await fetch(`/api/blogs/${id}`);
          if (!res.ok) throw new Error("Could not find article");
          
          const blog = await res.json();
          const dateStr = new Date(blog.date).toLocaleDateString("en-US", { year: 'numeric', month: 'long', day: 'numeric' });
          
          document.title = `${blog.title} | Connektly`;

          container.innerHTML = `
            <article class="reveal is-visible">
              <header class="post-header">
                <p class="page-breadcrumb" style="margin-bottom: 2rem;"><a href="/blogs">&larr; Back to Blogs</a></p>
                <div class="post-header__date">${dateStr}</div>
                <h1>${blog.title}</h1>
                <div class="post-header__meta">Written by <strong>${blog.author}</strong></div>
              </header>
              ${blog.coverImage ? `<img src="${blog.coverImage}" style="width: 100%; border-radius: 24px; max-height: 500px; object-fit: cover; margin-bottom: 3rem; box-shadow: 0 20px 40px rgba(0,0,0,0.1);" alt="Cover image" />` : ''}
              <div class="post-content">
                ${blog.content}
              </div>
            </article>
          `;
        } catch (err) {
          console.error(err);
          container.innerHTML = `<div style="text-align: center; padding: 4rem;"><h2>Error loading article</h2><p>Server may not be running.</p><a href="/blogs">Return to Blogs</a></div>`;
        }
      }
      loadPost();
    </script>
  </body>
</html>
