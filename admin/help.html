    body { background: #f4f8f6; color: #09130d; }
    .admin-header {
      background: #0d1c15; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
    }
    .admin-brand { display: flex; align-items: center; gap: 1rem; font-family: "Sora", sans-serif; font-weight: 700; font-size: 1.25rem; color: #fff; text-decoration: none; }
    .admin-brand img { width: 32px; height: 32px; }
    .admin-layout {
      display: grid; grid-template-columns: 350px 1fr; gap: 2rem; max-width: 1400px; margin: 2rem auto; padding: 0 2rem; align-items: start;
    }
    .panel {
      background: #fff; border-radius: 20px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.06);
    }
    .panel h2 { font-family: "Sora", sans-serif; font-size: 1.4rem; margin: 0 0 1.5rem; }
    .list-item { 
      padding: 1rem; border-radius: 12px; background: #f9fbfb; border: 1px solid #e1e7e4; margin-bottom: 1rem; 
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .list-item strong { font-size: 1.1rem; }
    .list-item small { color: #666; }
    .list-item__actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .editor-form { display: grid; gap: 1.2rem; }
    .editor-form label { display: grid; gap: 0.5rem; font-weight: 700; font-size: 0.9rem; color: #445950; }
    .editor-form input, .editor-form textarea, .editor-form select {
      width: 100%; padding: 0.8rem 1rem; border: 1px solid #c2cec8; border-radius: 12px; font-family: inherit; font-size: 1rem; background: #fff;
    }
    .editor-form input:focus, .editor-form textarea:focus, .editor-form select:focus {
      outline: 2px solid rgba(24, 191, 99, 0.4); border-color: #18bf63;
    }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; font-size: 0.9rem; transition: background 180ms ease; text-decoration: none; display: inline-block;
    }
    .btn--primary { background: #18bf63; color: #fff; }
    .btn--primary:hover { background: #15ad59; }
    .btn--secondary { background: #dfe8e3; color: #2d4036; }
    .btn--secondary:hover { background: #c5d3cc; }
    .btn--danger { background: #ffeded; color: #d63333; }
    .btn--danger:hover { background: #ffdbdb; }
  </style>

<body>

  <header class="admin-header">
    <a href="/admin/index.html" class="admin-brand">
      <img src="/Logo.svg" alt="Connektly" />
      Admin Hub / Help Articles
    </a>
    <a href="/help" class="btn btn--secondary" target="_blank">View Help Center</a>
  </header>

  <main class="admin-layout">
    <aside class="panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2 style="margin: 0;">Help Articles</h2>
        <button class="btn btn--primary" id="btn-new" style="font-size: 0.8rem;">+ New</button>
      </div>
      <div id="posts-list">Loading...</div>
    </aside>

    <section class="panel">
      <h2 id="editor-title">Create New Article</h2>
      <form class="editor-form" id="editor-form">
        <input type="hidden" id="entry-id" />
        
        <label>
          Title
          <input type="text" id="entry-title" required placeholder="Article title..." />
        </label>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <label>
            Author
            <input type="text" id="entry-author" required placeholder="Author" />
          </label>
          
          <label>
            Help Category
            <select id="entry-category">
              <option value="Connektly Overview">Connektly Overview</option>
              <option value="Get Started">Get Started</option>
              <option value="Connect Your Number">Connect Your Number</option>
              <option value="Privacy & Security">Privacy & Security</option>
            </select>
          </label>
        </div>
        
        <label>
          Short Excerpt (Shows in Search)
          <input type="text" id="entry-excerpt" required placeholder="A quick summary..." />
        </label>
        
        <label>
          Body Content 
          <p style="font-weight: normal; margin: 0; font-size: 0.8rem; color: #666;">Images can be pasted directly. To insert a manual Table of Contents, click "Insert > Table of Contents" in the editor menu.</p>
          <textarea id="entry-content" placeholder="Content..."></textarea>
        </label>

        <div style="display: flex; gap: 1rem; align-items: center; margin-top: 1rem;">
          <button type="submit" class="btn btn--primary" style="padding: 0.8rem 2rem;">Save Article</button>
          <span id="save-status" style="color: #18bf63; font-weight: 600; display: none;">Saved successfully!</span>
        </div>
      </form>
    </section>
  </main>

  <script>
    tinymce.init({
      selector: '#entry-content',
      plugins: 'image table link lists code autolink toc',
      toolbar: 'undo redo | blocks | bold italic forecolor backcolor | alignleft aligncenter alignright | bullist numlist | table image link toc | removeformat code',
      menubar: 'file edit view insert format tools table help', // Enable menubar to use Insert > TOC cleanly if toolbar is crowded
      height: 550,
      images_upload_url: '/api/upload', // Native drag and drop support
      automatic_uploads: true,
      setup: function(editor) { editor.on('change', function() { editor.save(); }); }
    });

    const listEl = document.getElementById('posts-list');
    const form = document.getElementById('editor-form');
    let allArticles = [];

    async function loadArticles() {
      try {
        const res = await fetch('/api/help');
        allArticles = await res.json();
        renderList();
      } catch (err) {
        listEl.innerHTML = `<p style="color: red;">Error connecting to API.</p>`;
      }
    }

    function renderList() {
      if (allArticles.length === 0) { listEl.innerHTML = "<p>No articles yet.</p>"; return; }
      listEl.innerHTML = allArticles.map(article => `
        <div class="list-item">
          <strong>${article.title}</strong>
          <small>Cat: ${article.category || 'General'}</small>
          <div class="list-item__actions">
            <button class="btn btn--secondary" onclick="editArticle('${article.id}')" type="button">Edit</button>
            <button class="btn btn--danger" onclick="deleteArticle('${article.id}')" type="button">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function editArticle(id) {
      const article = allArticles.find(a => a.id === id);
      if (!article) return;

      document.getElementById('editor-title').innerText = "Edit Article";
      document.getElementById('entry-id').value = article.id;
      document.getElementById('entry-title').value = article.title;
      document.getElementById('entry-author').value = article.author || "";
      document.getElementById('entry-category').value = article.category || "Get Started";
      document.getElementById('entry-excerpt').value = article.excerpt || "";
      tinymce.get('entry-content').setContent(article.content || "");
      window.scrollTo({top:0, behavior:'smooth'});
    }

    document.getElementById('btn-new').addEventListener('click', () => {
      document.getElementById('editor-title').innerText = "Create New Article";
      form.reset();
      document.getElementById('entry-id').value = "";
      tinymce.get('entry-content').setContent("");
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        title: document.getElementById('entry-title').value,
        author: document.getElementById('entry-author').value,
        excerpt: document.getElementById('entry-excerpt').value,
        category: document.getElementById('entry-category').value,
        content: tinymce.get('entry-content').getContent()
      };

      const id = document.getElementById('entry-id').value;
      const url = id ? `/api/help/${id}` : '/api/help';
      const method = id ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (res.ok) {
          document.getElementById('save-status').style.display = "inline-block";
          setTimeout(() => document.getElementById('save-status').style.display = "none", 3000);
          loadArticles();
          if (!id) {
            form.reset();
            tinymce.get('entry-content').setContent("");
          }
        }
      } catch (err) { alert("Failed to save article"); }
    });

    async function deleteArticle(id) {
      if (!confirm("Are you sure you want to delete this article?")) return;
      try {
        await fetch(`/api/help/${id}`, { method: 'DELETE' });
        if (document.getElementById('entry-id').value === id) {
          document.getElementById('btn-new').click();
        }
        loadArticles();
      } catch (err) { alert("Failed to delete article"); }
    }

    loadArticles();
  </script>
</body>
</html>
